<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>夸克音乐搜索 - Web版</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 主内容区 -->
  <main class="main-content">
    <!-- 搜索视图 -->
    <div id="searchView" class="search-view">
      <!-- 左侧面板 -->
      <div class="left-panel card">
        <div class="panel-section">
          <div class="section-title">搜索歌曲</div>
          <div class="form-group">
            <label class="form-label">歌曲名</label>
            <input type="text" class="form-input" id="searchTitle" placeholder="例如：晴天" onkeydown="if(event.key==='Enter')doSearch()">
          </div>
          <div class="form-group">
            <label class="form-label">歌手（选填）</label>
            <input type="text" class="form-input" id="searchSinger" placeholder="例如：周杰伦" onkeydown="if(event.key==='Enter')doSearch()">
          </div>
          <div class="form-group">
            <label class="form-label">搜索源</label>
            <select class="form-select" id="searchSource">
              <option value="gequbao">歌曲宝（推荐）</option>
              <option value="dgcol">动感酷音乐</option>
              <option value="xmwav">熊猫无损音乐</option>
              <option value="xmfwav">XM无损音乐</option>
              <option value="dtwav">动听音乐</option>
            </select>
          </div>
          <button class="btn btn-primary" id="searchBtn" onclick="doSearch()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;">
              <circle cx="11" cy="11" r="8"/>
              <path d="M21 21l-4.35-4.35"/>
            </svg>
            搜索
          </button>
        </div>

        <div class="panel-section" id="originalInfoSection" style="display:none">
          <div class="original-info">
            <div class="original-label">🏆 原唱信息</div>
            <div class="original-singer" id="originalSinger">-</div>
            <div class="original-source" id="originalSource">来源：豆瓣音乐</div>
          </div>
        </div>
      </div>

      <!-- 右侧面板 -->
      <div class="right-panel card">
        <div class="panel-header">
          <div class="panel-title">📋 搜索结果</div>
          <div class="result-count" id="resultCount">找到 0 首</div>
        </div>
        <div class="result-list" id="resultList">
          <div class="empty-state">
            <div class="empty-icon">🎶</div>
            <div class="empty-text">在左侧输入歌曲名开始搜索</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 推荐视图 -->
    <div id="recommendView" class="recommend-view" style="display:none">
      <div class="left-panel card">
        <div class="panel-header" style="margin-bottom: 16px;">
          <div class="panel-title">📊 榜单</div>
          <button class="refresh-btn" onclick="refreshRecommend()">🔄 刷新</button>
        </div>
        <div class="platform-selector">
          <button class="platform-btn active" onclick="switchPlatform('qq')">QQ音乐</button>
          <button class="platform-btn" onclick="switchPlatform('kugou')">酷狗</button>
          <button class="platform-btn" onclick="switchPlatform('netease')">网易云</button>
          <button class="platform-btn" onclick="switchPlatform('apple')">Apple</button>
        </div>
        <div class="toplist-list" id="toplistList">
          <div class="loading-state">
            <div class="spinner"></div>
            <div class="loading-text">加载中...</div>
          </div>
        </div>
      </div>
      <div class="right-panel card">
        <div class="panel-header">
          <div class="panel-title" id="currentToplistName">选择榜单</div>
          <div class="result-count" id="toplistCount">0 首</div>
        </div>
        <div class="toplist-songs" id="toplistSongs">
          <div class="empty-state">
            <div class="empty-icon">📊</div>
            <div class="empty-text">选择左侧榜单查看歌曲</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 收藏视图 -->
    <div id="favoritesView" class="favorites-view" style="display:none">
      <div class="favorites-header">
        <h2 style="font-size: 24px; font-weight: 700; letter-spacing: -0.5px;">⭐ 我的收藏</h2>
        <div style="display: flex; gap: 8px;">
          <button class="btn btn-secondary btn-small" onclick="exportFavorites()">📥 导出</button>
          <button class="btn btn-secondary btn-small" onclick="clearFavorites()">🗑️ 清空</button>
        </div>
      </div>
      <div class="favorites-list" id="favoritesList">
        <div class="empty-state" style="grid-column: 1 / -1;">
          <div class="empty-icon">💖</div>
          <div class="empty-text">还没有收藏的歌曲</div>
        </div>
      </div>
    </div>
  </main>

  <!-- 批量导出对话框 -->
  <div id="batchDialog" class="batch-dialog" style="display:none">
    <div class="batch-dialog-content">
      <h3>📦 批量导出</h3>
      <div class="batch-steps">
        <div class="batch-step active" id="batchStep1">1. 输入歌单</div>
        <div class="batch-step" id="batchStep2">2. 处理中</div>
        <div class="batch-step" id="batchStep3">3. 完成</div>
      </div>

      <!-- 第一步 -->
      <div id="batchStep1Content">
        <p style="margin-bottom: 12px; font-size: 14px; color: var(--text-secondary);">
          粘贴歌单内容，每行一首，格式：歌曲名 - 歌手
        </p>
        <textarea class="form-textarea" id="batchContent" rows="10" placeholder="例如：
晴天 - 周杰伦
稻香 - 周杰伦
Good Time - Owl City"></textarea>
        <div style="display: flex; gap: 12px; margin-top: 20px;">
          <button class="btn btn-secondary" onclick="toggleBatchExport()" style="flex:1;">取消</button>
          <button class="btn btn-primary" onclick="startBatchExport()" style="flex:1;">开始导出</button>
        </div>
      </div>

      <!-- 第二步 -->
      <div id="batchStep2Content" style="display:none">
        <div class="batch-progress" id="batchProgress">已处理: 0 / 0</div>
        <div class="batch-result-list" id="batchResultList"></div>
      </div>

      <!-- 第三步 -->
      <div id="batchStep3Content" style="display:none">
        <div style="text-align: center; padding: 20px 0;">
          <div style="font-size: 48px; margin-bottom: 16px;">🎉</div>
          <p style="font-size: 18px; font-weight: 600; margin-bottom: 8px;">导出完成！</p>
          <p style="color: var(--text-secondary); margin-bottom: 4px;">成功: <span id="batchSuccessCount">0</span> 首</p>
          <p style="color: var(--text-secondary); margin-bottom: 20px;">失败: <span id="batchFailCount">0</span> 首</p>
        </div>
        <div style="display: flex; gap: 12px;">
          <button class="btn btn-secondary" onclick="toggleBatchExport()" style="flex:1;">关闭</button>
          <button class="btn btn-primary" onclick="exportBatchResults()" style="flex:1;">导出结果</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Apple Music 风格播放器 -->
  <div class="apple-music-player" id="player">
    <!-- 收纳按钮 -->
    <button class="player-minimize-btn" onclick="togglePlayerMinimize()" title="收纳播放器">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="4 14 10 14 10 20"/>
        <polyline points="20 10 14 10 14 4"/>
        <line x1="14" y1="10" x2="21" y2="3"/>
        <line x1="3" y1="21" x2="10" y2="14"/>
      </svg>
    </button>
    
    <!-- 左侧：封面 + 歌曲信息 -->
    <div class="player-left">
      <div class="album-art" id="albumArt" onclick="toggleExpand()">
        <div class="album-art-inner">
          <svg class="music-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18V5l12-2v13" style="stroke-width: 1.8;"/>
            <circle cx="6" cy="18" r="3" style="stroke-width: 1.5;"/>
            <circle cx="18" cy="16" r="3" style="stroke-width: 1.5;"/>
          </svg>
        </div>
      </div>
      <div class="track-info">
        <div class="track-title" id="trackTitle">等待播放...</div>
        <div class="track-artist" id="trackArtist">点击歌曲开始播放</div>
      </div>
    </div>

    <!-- 中间：进度条 -->
    <div class="player-progress">
      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
        <div class="progress-thumb" id="progressThumb"></div>
      </div>
      <div class="time-display">
        <span class="time-current" id="currentTime">0:00</span>
        <span class="time-separator">/</span>
        <span class="time-duration" id="duration">0:00</span>
      </div>
    </div>

    <!-- 右侧：播放控制 -->
    <div class="player-controls">
      <button class="ctrl-btn" title="上一首" onclick="prevSong()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 20L9 12l10-8v16z"/>
          <line x1="5" y1="19" x2="5" y2="5"/>
        </svg>
      </button>
      <button class="ctrl-btn play-pause-btn" onclick="togglePlay()">
        <svg id="playIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="5 3 19 12 5 21 5 3" fill="currentColor" stroke="none"/>
        </svg>
        <svg id="pauseIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <line x1="6" y1="4" x2="6" y2="20"/>
          <line x1="18" y1="4" x2="18" y2="20"/>
        </svg>
      </button>
      <button class="ctrl-btn" title="下一首" onclick="nextSong()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 4l10 8-10 8V4z"/>
          <line x1="19" y1="5" x2="19" y2="19"/>
        </svg>
      </button>
    </div>

    <!-- 音量控制 -->
    <div class="player-volume">
      <button class="ctrl-btn volume-btn" title="音量" onclick="toggleMute()">
        <svg id="volumeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" stroke-width="1.5"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07" stroke-width="1.5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14" stroke-width="1.5"/>
        </svg>
        <svg id="muteIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" stroke-width="1.5"/>
          <line x1="23" y1="9" x2="17" y2="15" stroke-width="1.5"/>
          <line x1="17" y1="9" x2="23" y2="15" stroke-width="1.5"/>
        </svg>
      </button>
      <div class="volume-slider">
        <input type="range" min="0" max="100" value="75" id="volumeSlider">
      </div>
    </div>
  </div>

  <!-- 底部导航栏 -->
  <nav class="bottom-nav">
    <button class="bottom-nav-item active" data-tab="search" onclick="switchTab('search')">
      <svg class="bottom-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <path d="M21 21l-4.35-4.35"/>
      </svg>
      <span class="bottom-nav-label">搜索</span>
    </button>
    <button class="bottom-nav-item" data-tab="recommend" onclick="switchTab('recommend')">
      <svg class="bottom-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 18V5l12-2v13"/>
        <circle cx="6" cy="18" r="3"/>
        <circle cx="18" cy="16" r="3"/>
      </svg>
      <span class="bottom-nav-label">推荐</span>
    </button>
    <button class="bottom-nav-item bottom-nav-player-btn" id="playerExpandBtn" onclick="togglePlayerMinimize()" style="display:none">
      <div class="player-mini-cover">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
        </svg>
      </div>
    </button>
    <button class="bottom-nav-item" data-tab="favorites" onclick="switchTab('favorites')">
      <svg class="bottom-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      </svg>
      <span class="bottom-nav-label">收藏</span>
    </button>
    <button class="bottom-nav-item" onclick="toggleBatchExport()">
      <svg class="bottom-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
        <path d="M3 9h18"/>
        <path d="M9 21V9"/>
      </svg>
      <span class="bottom-nav-label">批量</span>
    </button>
  </nav>

  <!-- 音频元素 -->
  <audio id="audioPlayer"></audio>

  <script src="api.js"></script>
  <script src="app.js"></script>
</body>
</html>
